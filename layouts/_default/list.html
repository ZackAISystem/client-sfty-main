{{ define "main" }}
  <main class="default-list">
    <section class="section section--light">
      <div class="container">
        <h1>{{ .Title }}</h1>
        {{ .Content }}

        {{ if .Pages }}
          <div class="page-list">
            {{ range .Pages }}
              <a class="page-list__item" href="{{ .RelPermalink }}">
                {{ .Title }}
              </a>
            {{ end }}
          </div>
        {{ end }}
      </div>
    </section>
  </main>
{{ end }}
